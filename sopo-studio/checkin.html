<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sopo FuiFui Check In</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A96E;
      --navy: #1C2B3A;
      --cream: #FDFAF5;
      --white: #FFFFFF;
      --text: #1C2B3A;
      --muted: #4A6274;
      --border: rgba(201, 169, 110, 0.2);
      --border-soft: rgba(28, 43, 58, 0.08);
      --radius: 16px;
      --radius-sm: 8px;
      --red: #A0392A;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(circle at 50% 50%, #E09677 0%, #C97858 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin: 20px 0;
    }
    
    header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .brand-logo {
      display: block;
      max-width: 100%;
      max-height: 120px;
      margin: 0 auto 20px;
      border-radius: var(--radius-sm);
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 12px;
    }
    
    p.intro {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      background: rgba(253, 250, 245, 0.9);
      border: 1px solid rgba(28, 43, 58, 0.15);
      border-radius: var(--radius-sm);
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }
    
    input:focus, select:focus {
      border-color: var(--navy);
      background: var(--white);
    }
    
    .btn-submit {
      background: var(--navy);
      color: var(--cream);
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 4px 12px rgba(28, 43, 58, 0.15);
      margin-top: 10px;
    }
    
    .btn-submit:hover {
      background: #2D3F50;
    }
    
    .success-card {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: var(--navy);
      margin-bottom: 12px;
    }
    
    .success-text {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: rgba(253, 250, 245, 0.8);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <div class="container" id="mainContainer">
    <div id="formSection">
      <header>
        <!-- Branded Gold Serif Emblem -->
        <div style="width: 72px; height: 72px; border-radius: 50%; border: 1.5px solid var(--gold); background: rgba(201, 169, 110, 0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 4px 12px rgba(201, 169, 110, 0.1);">
          <span style="font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--gold); letter-spacing: 1px;">SF</span>
        </div>
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;">Sopo FuiFui</div>
        <div style="font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 24px;">Wanna give it a go?</div>
        <h1>Check-in</h1>
        <p class="intro">Please fill out this quick form. It takes two minutes. This <strong>helps us</strong> see if we can <strong>get you into your new home</strong>.</p>
      </header>
      
      <form id="checkinForm" onsubmit="handleCheckin(event)">
        <div class="form-group">
          <label for="fullName">Your Name</label>
          <input type="text" id="fullName" required placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
          <label for="emailAddress">Your Email</label>
          <input type="email" id="emailAddress" required placeholder="Enter your email address">
        </div>
        
        <div class="form-group">
          <label for="phoneNumber">Your Mobile Number</label>
          <input type="tel" id="phoneNumber" required placeholder="Enter your mobile number">
        </div>

        <div class="form-group">
          <label for="firstHome">Is this your first home purchase?</label>
          <select id="firstHome" required>
            <option value="" disabled selected>Select an option</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="employmentStatus">What is your current work situation?</label>
          <select id="employmentStatus" required>
            <option value="" disabled selected>Select work status</option>
            <option value="Full Time">Full time job</option>
            <option value="Part Time">Part time job</option>
            <option value="Self Employed">Self employed</option>
            <option value="Other">Other situation</option>
          </select>
        </div>

        <div class="form-group">
          <label for="householdIncome">What is your total household income each year?</label>
          <select id="householdIncome" required>
            <option value="" disabled selected>Select income range</option>
            <option value="Under 80000">Under 80000 dollars</option>
            <option value="80000 to 120000">80000 to 120000 dollars</option>
            <option value="Over 120000">Over 120000 dollars</option>
          </select>
        </div>

        <div class="form-group">
          <label for="depositSaved">Do you have a deposit saved or KiwiSaver?</label>
          <select id="depositSaved" required>
            <option value="" disabled selected>Select an option</option>
            <option value="Yes Deposit">Yes, I have a deposit saved</option>
            <option value="Yes KiwiSaver">Yes, I have KiwiSaver available</option>
            <option value="Yes Both">Yes, I have both deposit and KiwiSaver</option>
            <option value="No Still Saving">No, I am still saving money</option>
          </select>
        </div>

        <div class="form-group">
          <label for="depositAmount">Savings or KiwiSaver total amount</label>
          <input type="text" id="depositAmount" required placeholder="e.g. $15,000 or $30k">
        </div>

        <div class="form-group">
          <label for="targetArea">What area in Hamilton are you looking to buy in?</label>
          <input type="text" id="targetArea" required placeholder="e.g. Norton, Frankton, Dinsdale">
        </div>

        <div class="form-group">
          <label for="purchaseTime">When are you hoping to purchase your home?</label>
          <select id="purchaseTime" required>
            <option value="" disabled selected>Select time frame</option>
            <option value="Immediately">Right away</option>
            <option value="Within 3 Months">Within three months</option>
            <option value="Within 6 Months">Within six months</option>
            <option value="Just Looking">I am just looking for now</option>
          </select>
        </div>
        
        <button type="submit" class="btn-submit">Submit My Details</button>
      </form>
    </div>
    
    <div id="successSection" class="success-card">
      <div class="logo-container" style="width: 48px; height: 48px; background: var(--green); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
        <svg viewBox="0 0 24 24" fill="none" width="24" height="24" stroke="#FDFAF5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2 class="success-title">Thank You</h2>
      <p class="success-text">Sopo has received your details. Redirecting to schedule your meeting now...</p>
    </div>
  </div>
  
  <div class="footer">
    <p>Powered by The MarketPlace</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Check status configuration
      fetch("status.json")
        .then(response => response.json())
        .then(data => {
          if (data.status !== "active") {
            const container = document.getElementById("mainContainer");
            if (container) {
              container.innerHTML = `
                <div style="text-align: center; padding: 20px 0;">
                  <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--red); margin-bottom: 12px;">Service Offline</h2>
                  <p style="font-size: 14px; color: #4A6274; line-height: 1.6;">This service is not active right now. Please try again later.</p>
                </div>
              `;
            }
          }
        })
        .catch(error => {
          console.warn("Status check skipped");
        });
    });

    function handleCheckin(event) {
      event.preventDefault();
      
      const urlParams = new URLSearchParams(window.location.search);
      const sourceChannel = urlParams.get('source') || 'Open Home';
      
      const payload = {
        name: document.getElementById('fullName').value.trim(),
        email: document.getElementById('emailAddress').value.trim(),
        phone: document.getElementById('phoneNumber').value.trim(),
        firstHome: document.getElementById('firstHome').value,
        employment: document.getElementById('employmentStatus').value,
        income: document.getElementById('householdIncome').value,
        deposit: document.getElementById('depositSaved').value,
        depositAmount: document.getElementById('depositAmount').value.trim(),
        area: document.getElementById('targetArea').value.trim(),
        timeFrame: document.getElementById('purchaseTime').value,
        timestamp: new Date().toISOString(),
        source: sourceChannel
      };
      
      // Submit to Sopo check in webhook
      const webhookUrl = "https://hook.us2.make.com/w5edk3kewavnrc9l0k05tj60ekvbbhwu";
      
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
      
      fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        console.log("Check in lead sent successfully");
        setTimeout(() => {
          window.location.href = `book_meeting.html?email=${encodeURIComponent(payload.email)}&name=${encodeURIComponent(payload.name)}`;
        }, 1200);
      })
      .catch(error => {
        console.warn("Lead buffered locally:", error.message);
        setTimeout(() => {
          window.location.href = `book_meeting.html?email=${encodeURIComponent(payload.email)}&name=${encodeURIComponent(payload.name)}`;
        }, 1200);
      });
    }
  </script>
</body>
</html>
