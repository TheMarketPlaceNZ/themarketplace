<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Station | The MarketPlace NZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b263b;
      --gold: #C9923A;
      --text: #ffffff;
      --text-secondary: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
    }

    body {
      background: radial-gradient(circle at 50% 50%, var(--navy-light) 0%, var(--navy) 100%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 30px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .logoBlock {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logoMark {
      width: 40px;
      height: 40px;
      background: var(--gold);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brandHeader {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 3px;
    }

    h1 {
      font-size: 28px;
      margin: 0;
      font-weight: 700;
      background: linear-gradient(180deg, #ffffff 0%, #a0aec0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .setupPanel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 25px;
      margin-bottom: 30px;
    }

    .panelTitle {
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 15px;
    }

    .inputRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 15px;
    }

    @media (max-width: 768px) {
      .inputRow {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .saveButton {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
    }

    .saveButton:active {
      transform: scale(0.98);
    }

    /* Grid Layout for Leads */
    .dashboardGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 30px;
    }

    .leadCard {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease;
      position: relative;
    }

    .leadCard:hover {
      transform: translateY(-5px);
      border-color: rgba(201, 146, 58, 0.3);
    }

    .cardBadge {
      position: absolute;
      top: 25px;
      right: 25px;
      background: rgba(201, 146, 58, 0.1);
      border: 1px solid rgba(201, 146, 58, 0.2);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
    }

    .clientName {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .clientMeta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
      margin-bottom: 20px;
    }

    .briefSection {
      margin-bottom: 20px;
    }

    .briefTitle {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .briefContent {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      max-height: 150px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.01);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .voiceButton {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      font-family: 'Outfit', sans-serif;
    }

    .voiceButton:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .voiceButton:active {
      transform: scale(0.98);
    }

    .voiceButton.playing {
      background: #10B981;
      color: var(--navy);
      border-color: #10B981;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logoBlock">
        <div class="logoMark">
          <svg viewBox="0 0 18 18" fill="none" width="20" height="20">
            <path d="M9 2L11 7H16L12 10.5L13.5 16L9 13L4.5 16L6 10.5L2 7H7L9 2Z" fill="#0d1b2a"/>
          </svg>
        </div>
        <div>
          <div class="brandHeader">The MarketPlace</div>
          <h1>Command Station</h1>
        </div>
      </div>
      <div>
        <!-- Status indicator -->
        <span style="font-size:13px;color:#10B981;font-weight:600;display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 8px #10B981"></span>
          Operational Engine Active
        </span>
      </div>
    </header>

    <!-- Credentials & Config Setup -->
    <div class="setupPanel">
      <div class="panelTitle">Jarvis Integration Config</div>
      <div class="inputRow">
        <div>
          <label>Google Sheet Published CSV URL</label>
          <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" onchange="saveConfig()">
        </div>
        <div>
          <label>ElevenLabs API Key</label>
          <input type="password" id="elevenApiKey" placeholder="Enter your ElevenLabs API Key" onchange="saveConfig()">
        </div>
      </div>
      <div style="text-align: right">
        <button class="saveButton" onclick="loadDashboard()">Sync Command Station</button>
      </div>
    </div>

    <!-- Active Leads Grid -->
    <div class="dashboardGrid" id="leadsGrid">
      <!-- Cards will be dynamically injected here -->
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">
        Configure your Google Sheet CSV URL above and click Sync to stream active leads live!
      </div>
    </div>
  </div>

  <script>
    // Load config from local storage on load
    document.addEventListener("DOMContentLoaded", () => {
      const storedUrl = localStorage.getItem("jarvisSheetUrl");
      const storedKey = localStorage.getItem("jarvisElevenKey");
      
      if (storedUrl) document.getElementById("sheetUrl").value = storedUrl;
      if (storedKey) document.getElementById("elevenApiKey").value = storedKey;
      
      if (storedUrl) {
        loadDashboard();
      }
    });

    function saveConfig() {
      const sheetUrl = document.getElementById("sheetUrl").value.trim();
      const elevenKey = document.getElementById("elevenApiKey").value.trim();
      
      localStorage.setItem("jarvisSheetUrl", sheetUrl);
      localStorage.setItem("jarvisElevenKey", elevenKey);
    }

    async function loadDashboard() {
      const sheetUrl = document.getElementById("sheetUrl").value.trim();
      const grid = document.getElementById("leadsGrid");
      
      if (!sheetUrl) {
        alert("Please paste your published Google Sheet CSV URL first.");
        return;
      }

      grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--gold); padding: 40px;">Syncing latest database updates...</div>`;

      try {
        const response = await fetch(sheetUrl);
        if (!response.ok) throw new Error("Failed to fetch sheet");
        const csvText = await response.text();
        
        const leads = parseCSV(csvText);
        renderLeads(leads);
      } catch (err) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #e63946; padding: 40px;">Connection failed. Verify your Google Sheet is published to the web as CSV.</div>`;
      }
    }

    // Simple CSV parser
    function parseCSV(text) {
      const lines = text.split("\n");
      const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ''));
      const results = [];

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        
        // Handle comma separation inside quotes
        const row = [];
        let insideQuote = false;
        let entry = "";
        
        for (let char of lines[i]) {
          if (char === '"') {
            insideQuote = !insideQuote;
          } else if (char === ',' && !insideQuote) {
            row.push(entry.trim().replace(/^"|"$/g, ''));
            entry = "";
          } else {
            entry += char;
          }
        }
        row.push(entry.trim().replace(/^"|"$/g, ''));

        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = row[index] || "";
        });
        results.push(obj);
      }
      return results;
    }

    function renderLeads(leads) {
      const grid = document.getElementById("leadsGrid");
      grid.innerHTML = "";

      if (leads.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">Zero active leads found in database.</div>`;
        return;
      }

      leads.forEach((lead, index) => {
        const card = document.createElement("div");
        card.className = "leadCard";
        
        const name = lead.Name || lead.name || "Unknown Lead";
        const email = lead.Email || lead.email || "No Email";
        const company = lead.Company || lead.company || "No Company";
        const website = lead.Website || lead.website || "No Website";
        const choice = lead.Choice || lead.choice || "Pending Choice";
        const pkg = lead.Package || lead.packageSelection || "No Package Selection";
        const date = lead.Date || lead.allocatedDate || "No Date Set";
        const time = lead.Time || lead.allocatedTime || "No Time Set";
        const brief = lead.Brief || lead.ResearchBrief || lead.gapPercentage || "Perplexity Lead Briefing Pending...";

        card.innerHTML = `
          <div class="cardBadge">${choice}</div>
          <div class="clientName">${name}</div>
          <div class="clientMeta">${company} · ${email}</div>
          
          <div class="divider"></div>
          
          <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6;">
            <div><strong>Package:</strong> ${pkg}</div>
            <div><strong>Schedule:</strong> ${date} at ${time}</div>
            <div><strong>Site:</strong> <a href="${website}" target="_blank" style="color:var(--gold);text-decoration:none;">${website}</a></div>
          </div>
          
          <div class="divider"></div>
          
          <div class="briefSection">
            <div class="briefTitle">Lead Intelligence Briefing</div>
            <div class="briefContent" id="brief-${index}">${brief}</div>
          </div>
          
          <button class="voiceButton" id="btn-${index}" onclick="readBrief('${index}')">
            <!-- SVG Audio Speaker Icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
            Listen to Briefing
          </button>
        `;
        grid.appendChild(card);
      });
    }

    // Play/Pause state tracking
    let activeAudio = null;
    let activeBtn = null;

    async function readBrief(index) {
      const briefText = document.getElementById(`brief-${index}`).textContent;
      const btn = document.getElementById(`btn-${index}`);
      const apiKey = document.getElementById("elevenApiKey").value.trim();

      if (activeAudio) {
        activeAudio.pause();
        activeAudio = null;
        activeBtn.classList.remove("playing");
        activeBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
          Listen to Briefing`;
        
        if (activeBtn === btn) {
          activeBtn = null;
          return; // Toggle off if clicked again
        }
      }

      if (!apiKey) {
        // Fallback: browser free native Speech Synthesis
        statusTextPrompt("Using browser text to speech fallback...");
        
        const utterance = new SpeechSynthesisUtterance(briefText);
        utterance.onend = function() {
          btn.classList.remove("playing");
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
            Listen to Briefing`;
        };
        
        btn.classList.add("playing");
        btn.textContent = "🔊 Speaking Brief...";
        activeBtn = btn;
        window.speechSynthesis.speak(utterance);
        
        // Simple mock player tracking for fallback
        activeAudio = {
          pause: () => window.speechSynthesis.cancel()
        };
        return;
      }

      // Premium ElevenLabs Voice Integration
      btn.textContent = "⚙ Generating Jarvis Voice...";
      btn.classList.add("playing");
      activeBtn = btn;

      // Rachel premium voice ID (clonable with your own custom Jarvis voice!)
      const voiceId = "21m00Tcm4TlvDq8ikWAM"; 
      const endpoint = "https://api.elevenlabs.io/v1/text-to-speech/" + voiceId;

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: {
            "xi-api-key": apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: briefText,
            model_id: "eleven_monolingual_v1",
            voice_settings: {
              stability: 0.75,
              similarity_boost: 0.85
            }
          })
        });

        if (!response.ok) throw new Error("ElevenLabs generation failed");
        
        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        
        const audio = new Audio(audioUrl);
        activeAudio = audio;
        
        audio.play();
        btn.textContent = "🔊 Playing Brief...";
        
        audio.onended = () => {
          btn.classList.remove("playing");
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
            Listen to Briefing`;
          activeAudio = null;
          activeBtn = null;
        };
      } catch (err) {
        alert("ElevenLabs API failed. Please verify your API Key and credits.");
        btn.classList.remove("playing");
        btn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
          Listen to Briefing`;
        activeBtn = null;
      }
    }

    function statusTextPrompt(text) {
      console.log(text);
    }
  </script>
</body>
</html>
